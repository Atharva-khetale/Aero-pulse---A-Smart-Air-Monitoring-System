<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SmartAir{% endblock %} — Aura Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Design Tokens ── */
  :root {
    --bg:        #e8edf0;
    --surface:   #eef1f3;
    --shadow-d:  #c8ced2;
    --shadow-l:  #ffffff;
    --primary:   #00695c;
    --primary-c: #4ecdc4;
    --accent:    #61f4d8;
    --text:      #2c2f30;
    --muted:     #6b7280;
    --error:     #b91c1c;
    --good:      #10b981;
    --moderate:  #f59e0b;
    --unhealthy: #ef4444;
    --hazardous: #7f1d1d;
    --r-sm:  12px;
    --r-md:  18px;
    --r-lg:  24px;
    --r-xl:  32px;
    --shadow-neu-out: 6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
    --shadow-neu-in:  inset 3px 3px 8px var(--shadow-d), inset -3px -3px 8px var(--shadow-l);
    --shadow-card: 8px 8px 20px var(--shadow-d), -6px -6px 16px var(--shadow-l);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* Mobile phone frame */
  .phone-wrap {
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 20px;
  }
  .phone-frame {
    width: 100%; max-width: 420px;
    min-height: 100vh;
    background: var(--bg);
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }
  @media (min-width: 600px) {
    .phone-frame {
      min-height: 860px; max-height: 900px;
      border-radius: 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .phone-wrap { align-items: center; }
  }

  /* ── Top Bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 13px; letter-spacing: 1.5px;
    color: var(--primary); text-transform: uppercase;
  }
  .topbar-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), var(--primary-c));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .wifi-icon { color: var(--muted); font-size: 18px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #78350f;
    box-shadow: var(--shadow-neu-out);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: sticky; bottom: 0;
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px 20px 16px;
    background: var(--bg);
    border-top: 1px solid rgba(0,0,0,0.04);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 20px; border-radius: 50px;
    text-decoration: none; border: none; background: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--muted); transition: all 0.2s;
  }
  .nav-btn.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-c));
    color: #fff; box-shadow: var(--shadow-neu-out);
  }
  .nav-btn span.icon { font-size: 18px; }

  /* ── Scroll Content ── */
  .screen-content {
    overflow-y: auto; overflow-x: hidden;
    max-height: calc(100vh - 130px);
    padding: 0 18px 12px;
    scrollbar-width: none;
  }
  .screen-content::-webkit-scrollbar { display: none; }

  /* ── Neumorphic Cards ── */
  .neu-card {
    background: var(--bg);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 20px;
    margin-bottom: 16px;
  }
  .neu-card-sm {
    background: var(--bg);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-neu-out);
    padding: 16px;
  }

  /* ── Buttons ── */
  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: linear-gradient(135deg, var(--primary) 0%, #00897b 100%);
    color: #fff; border: none; border-radius: 50px;
    padding: 13px 28px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; width: 100%;
    box-shadow: 4px 4px 12px rgba(0,105,92,0.3), -2px -2px 8px var(--shadow-l);
    transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 6px 6px 18px rgba(0,105,92,0.4); }
  .btn-secondary {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--bg); color: var(--primary); border: none; border-radius: 50px;
    padding: 11px 24px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; width: 100%;
    box-shadow: var(--shadow-neu-out);
    transition: all 0.2s;
  }
  .btn-outline {
    background: none; color: var(--primary);
    border: 1.5px solid var(--primary); border-radius: 50px;
    padding: 8px 20px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost {
    background: none; border: none;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; padding: 8px 12px;
  }

  /* ── Text Input ── */
  .field-wrap { position: relative; margin-bottom: 12px; }
  .field-label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }
  .neu-input {
    width: 100%; padding: 14px 18px;
    background: var(--bg); color: var(--text);
    border: none; border-radius: var(--r-md);
    box-shadow: var(--shadow-neu-in);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: box-shadow 0.2s;
  }
  .neu-input:focus { box-shadow: var(--shadow-neu-in), 0 0 0 2px rgba(0,105,92,0.2); }
  .neu-input::placeholder { color: #a0aec0; }

  /* ── Status badge ── */
  .conn-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 50px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    box-shadow: var(--shadow-neu-out);
  }
  .conn-badge.live { background: rgba(16,185,129,0.1); color: #059669; }
  .conn-badge.live::before { content: '●'; animation: pulse 1.5s infinite; }
  .conn-badge.offline { background: rgba(185,28,28,0.1); color: var(--error); }
  .conn-badge.offline::before { content: '○'; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── AQI Ring ── */
  .aqi-ring-wrap { display: flex; justify-content: center; padding: 8px 0; }
  .aqi-ring-svg { filter: drop-shadow(4px 4px 12px rgba(0,0,0,0.12)); }

  /* ── Grid ── */
  .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .sensor-card {
    background: var(--bg); border-radius: var(--r-md);
    box-shadow: var(--shadow-card); padding: 16px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .sensor-icon-wrap {
    width: 38px; height: 38px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 6px;
    box-shadow: var(--shadow-neu-out);
  }
  .sensor-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
  .sensor-value { font-size: 24px; font-weight: 700; line-height: 1; }
  .sensor-sub   { font-size: 9px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); }

  /* ── Recs cards ── */
  .rec-card {
    border-radius: var(--r-lg);
    padding: 20px; margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .rec-cat { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .rec-cat-icon { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .rec-title { font-size: 20px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
  .rec-body  { font-size: 13px; line-height: 1.6; opacity: 0.8; margin-bottom: 14px; }
  .rec-actions { display: flex; gap: 10px; align-items: center; }
  .rec-btn-primary { padding: 9px 18px; border-radius: 50px; border: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
  .rec-btn-ghost   { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; opacity: 0.6; }

  /* ── Pro tip ── */
  .pro-tip {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border-radius: 50px;
    background: var(--bg); box-shadow: var(--shadow-neu-out);
    font-size: 12px; font-weight: 500; color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Misc ── */
  .screen-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
  .screen-sub   { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .tag { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }

  .divider { text-align: center; font-size: 12px; color: var(--muted); margin: 14px 0; }
  .error-msg { color: var(--error); font-size: 12px; margin: 6px 0; min-height: 16px; }
  a { text-decoration: none; color: inherit; }

  /* ── Loading spinner ── */
  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--bg);
    border-top-color: var(--primary);
    animation: spin 0.8s linear infinite;
    box-shadow: var(--shadow-neu-out);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── AQI scale bar ── */
  .aqi-scale { width: 100%; height: 8px; border-radius: 4px; margin: 8px 0 4px; overflow: hidden; }
  .aqi-scale-bar { height: 100%; background: linear-gradient(to right, #10b981, #a3e635, #f59e0b, #ef4444, #7f1d1d); }
  .aqi-scale-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); font-weight: 600; }

  /* Slide-up animation */
  @keyframes slideUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .slide-up { animation: slideUp 0.4s ease forwards; }
  .delay-1 { animation-delay: 0.05s; opacity:0; }
  .delay-2 { animation-delay: 0.1s;  opacity:0; }
  .delay-3 { animation-delay: 0.15s; opacity:0; }
  .delay-4 { animation-delay: 0.2s;  opacity:0; }
  .delay-5 { animation-delay: 0.25s; opacity:0; }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>
<div class="phone-wrap">
  <div class="phone-frame">
    {% block content %}{% endblock %}
  </div>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
